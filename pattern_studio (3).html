<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0e0e0e;
  --surface: #181818;
  --border: rgba(255,255,255,0.07);
  --text: #e8e8e8;
  --muted: rgba(255,255,255,0.3);
  --accent: #e4f222;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  overflow: hidden;
}

#app {
  display: grid;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* Canvas */
#canvas-wrap {
  position: relative;
  overflow: hidden;
  background: #000;
}

#canvas-wrap canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Header */
#header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  gap: 24px;
}

#header h1 {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
}

.pattern-tabs {
  display: flex;
  gap: 2px;
  margin-left: 8px;
}

.tab {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.15s;
}

.tab:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }

.header-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.export-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.15s;
}

.export-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.export-btn.primary { border-color: var(--accent); color: var(--accent); }
.export-btn.primary:hover { background: var(--accent); color: #000; }

/* Canvas */
#canvas-wrap {
  position: relative;
  overflow: hidden;
  background: #000;
}

#canvas-wrap canvas {
  display: block;
  width: 100%;
  height: 100%;
}


/* Panel */

.divider-v {
  width: 1px;
  height: 28px;
  background: var(--border);
  margin: 0 4px;
}

/* Color presets — horizontal in header */
.preset-grid {
  display: flex;
  gap: 6px;
  align-items: center;
}

.preset {
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s;
  width: 48px;
  height: 28px;
  position: relative;
  flex-shrink: 0;
}

.preset:hover { border-color: rgba(255,255,255,0.25); }
.preset.active { border-color: var(--accent); }

.preset-swatch {
  width: 100%;
  height: 100%;
  display: flex;
}

.preset-swatch .a { flex: 1; }
.preset-swatch .b { flex: 1; }

.preset-label {
  display: none;
}

/* Custom colors */
.color-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.color-row label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  width: 28px;
}

input[type="color"] {
  -webkit-appearance: none; appearance: none;
  width: 32px; height: 32px;
  border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; padding: 0; background: none; overflow: hidden;
}
input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }

.hex-val {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* Sliders */
.slider-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.slider-row {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.slider-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.slider-name {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.slider-val {
  font-size: 10px;
  color: var(--text);
}

input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px; outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%; background: var(--text); cursor: pointer;
}

/* Export modal */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#modal-overlay.show { display: flex; }

#modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  width: 360px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#modal h2 {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
}

#modal p {
  font-size: 11px;
  line-height: 1.6;
  color: var(--muted);
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 8px;
}

.modal-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 7px 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: 5px;
  transition: all 0.15s;
}
.modal-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.modal-btn.accent { border-color: var(--accent); color: var(--accent); }
.modal-btn.accent:hover { background: var(--accent); color: #000; }

#recording-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: #ff4444;
  letter-spacing: 0.08em;
}
#recording-indicator.show { display: flex; }
.rec-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ff4444;
  animation: blink 1s infinite;
}
#btn-randomize {
  position: fixed;
  bottom: 28px;
  left: 28px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 22px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  z-index: 10;
}
#btn-randomize:hover {
  border-color: var(--accent);
  color: var(--accent);
}
#btn-randomize svg {
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#btn-randomize:hover svg {
  transform: scale(-1, 1);
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>Onramp Pattern Studio</h1>
    <div class="pattern-tabs">
      <button class="tab active" data-pattern="1">Pattern 01 — Wave</button>
      <button class="tab" data-pattern="2">Pattern 02 — Mirror</button>
      <button class="tab" data-pattern="3">Pattern 03 — Pulse</button>
      <button class="tab" data-pattern="4">Pattern 04 — Noise</button>
      <button class="tab" data-pattern="5">Pattern 05 — Chevron</button>
    </div>
    <div class="divider-v"></div>
    <div class="preset-grid" id="preset-grid"></div>
    <div class="header-right">
      <div id="recording-indicator"><div class="rec-dot"></div> Recording...</div>
      <button class="export-btn" id="btn-mp4">Export Video</button>
      <button class="export-btn" id="btn-all">Export All</button>
      <button class="export-btn primary" id="btn-html">Export HTML</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
</div>

<button id="btn-randomize" title="Randomize">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 3 21 3 21 8"/>
    <line x1="4" y1="20" x2="21" y2="3"/>
    <polyline points="21 16 21 21 16 21"/>
    <line x1="4" y1="4" x2="21" y2="21"/>
  </svg>
  Randomize
</button>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">Export</h2>
    <p id="modal-body"></p>
    <div class="modal-actions">
      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn accent" id="modal-confirm">OK</button>
    </div>
  </div>
</div>

<script>
// ─── Color Presets ───────────────────────────────────────────────
const PRESETS = [
  { name: 'Lime',   a: '#e4f222', b: '#d2cecb' },
  { name: 'Sky',    a: '#e4ebf6', b: '#609aff' },
  { name: 'Teal',   a: '#609aff', b: '#17332d' },
  { name: 'Orange', a: '#e96516', b: '#86472e' },
  { name: 'Olive',  a: '#5e540e', b: '#e4f222' },
];

// ─── State ───────────────────────────────────────────────────────
let currentPattern = 1;
let colorA = [232, 99, 22];
let colorB = [107, 58, 33];
let speedVal = 50, waveVal = 55, depthVal = 70;
let activePreset = 0;

// ─── Canvas ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ─── Build Preset Grid ───────────────────────────────────────────
const grid = document.getElementById('preset-grid');
PRESETS.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'preset' + (i === 0 ? ' active' : '');
  el.innerHTML = `<div class="preset-swatch"><div class="a" style="background:${p.a}"></div><div class="b" style="background:${p.b}"></div></div><div class="preset-label">${p.name}</div>`;
  el.addEventListener('click', () => {
    document.querySelectorAll('.preset').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    activePreset = i;
    const ra = hexToRgb(p.a), rb = hexToRgb(p.b);
    colorA = ra; colorB = rb;
    document.getElementById('colorA').value = p.a;
    document.getElementById('colorB').value = p.b;
    document.getElementById('hexA').textContent = p.a;
    document.getElementById('hexB').textContent = p.b;
  });
  grid.appendChild(el);
});

// Tabs
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentPattern = +t.dataset.pattern;
  });
});
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentPattern = +t.dataset.pattern;
  });
});

// ─── Animation 1 (exact from PATTERN_1.html) ─────────────────────
function drawPattern1(ts, W, H) {
  const NUM_COLS=23, LOOP_MS=30000, PHASE_SPREAD=0.55;
  const BRIGHT_MAX=0.82, BRIGHT_MIN=0.12, MAX_DRIFT=1.8;
  const SNAP_PX=50, SNAP_MOVE_MS=840, SNAP_REST_MS=2000;
  const SNAP_CYCLE_MS=SNAP_REST_MS+SNAP_MOVE_MS, SNAP_STAGGER_MS=100;

  function easeInOutSine(t){ return -(Math.cos(Math.PI*t)-1)/2; }

  function getSnapY(ci){
    const elapsed=ts-ci*SNAP_STAGGER_MS;
    const cycle=Math.floor(elapsed/SNAP_CYCLE_MS);
    const localT=((elapsed%SNAP_CYCLE_MS)+SNAP_CYCLE_MS)%SNAP_CYCLE_MS;
    let moveFrac=0;
    if(localT>=SNAP_REST_MS) moveFrac=easeInOutSine((localT-SNAP_REST_MS)/SNAP_MOVE_MS);
    return (cycle+moveFrac)*SNAP_PX;
  }

  const t=(ts%LOOP_MS)/LOOP_MS;
  const colW=W/NUM_COLS, cellH=H/26;

  for(let ci=0;ci<NUM_COLS;ci++){
    const phase=(ci/(NUM_COLS-1))*PHASE_SPREAD;
    const ct=(t+phase)%1.0;
    const sine=Math.sin(ct*Math.PI*2);
    const brightFrac=BRIGHT_MIN+((sine+1)/2)*(BRIGHT_MAX-BRIGHT_MIN);
    const brightH=brightFrac*cellH;
    const darkH=(1-brightFrac)*cellH;
    const driftPx=sine*MAX_DRIFT*cellH;
    const snapPx=getSnapY(ci);
    const totalOffset=driftPx-snapPx;
    const offset=((totalOffset%cellH)+cellH*20)%cellH;
    let y=-cellH*3+offset;
    while(y<H+cellH){
      ctx.fillStyle=`rgb(${colorA[0]},${colorA[1]},${colorA[2]})`;
      ctx.fillRect(Math.floor(x=ci*colW),Math.floor(y),Math.ceil(colW)+1,Math.ceil(brightH));
      ctx.fillStyle=`rgb(${colorB[0]},${colorB[1]},${colorB[2]})`;
      ctx.fillRect(Math.floor(ci*colW),Math.floor(y+brightH),Math.ceil(colW)+1,Math.ceil(darkH));
      y+=cellH;
    }
  }
}

// ─── Animation 2 ─────────────────────────────────────────────────
function drawPattern2(ts, W, H) {
  const NUM_COLS=23;
  const loopMs=60000-(speedVal-1)/99*58000;
  const t=(ts%loopMs)/loopMs;
  const phaseSpread=0.05+(waveVal/100)*0.80;
  const brightMax=0.82,brightMin=0.12,maxDrift=0.5+(depthVal/100)*2.0;
  const SNAP_PX=50,SNAP_MOVE_MS=840,SNAP_REST_MS=2000;
  const SNAP_CYCLE_MS=SNAP_REST_MS+SNAP_MOVE_MS;
  function eio(t){return -(Math.cos(Math.PI*t)-1)/2;}
  function getSnap(idx){
    const elapsed=ts-idx*100;
    const cycle=Math.floor(elapsed/SNAP_CYCLE_MS);
    const lt=((elapsed%SNAP_CYCLE_MS)+SNAP_CYCLE_MS)%SNAP_CYCLE_MS;
    let mf=0; if(lt>=SNAP_REST_MS)mf=eio((lt-SNAP_REST_MS)/SNAP_MOVE_MS);
    return (cycle+mf)*SNAP_PX;
  }

  ctx.fillStyle=`rgb(${colorB[0]},${colorB[1]},${colorB[2]})`;
  ctx.fillRect(0,0,W,H);
  const colW=W/NUM_COLS,cellH=H/26;
  for(let ci=0;ci<NUM_COLS;ci++){
    const d=Math.abs(ci-(NUM_COLS-1)/2)/((NUM_COLS-1)/2);
    const phase=d*phaseSpread;
    const ct=(t+phase)%1;
    const sine=Math.sin(ct*Math.PI*2);
    const bf=brightMin+((sine+1)/2)*(brightMax-brightMin);
    const bH=bf*cellH,dH=(1-bf)*cellH;
    const dir=ci<NUM_COLS/2?-1:1;
    const drift=sine*maxDrift*cellH*dir;
    const sd=Math.round(Math.abs(ci-(NUM_COLS-1)/2));
    const snap=getSnap(sd)*dir;
    const off=((drift-snap)%cellH+cellH*20)%cellH;
    const x=ci*colW; let y=-cellH*3+off;
    while(y<H+cellH){
      ctx.fillStyle=`rgb(${colorA[0]},${colorA[1]},${colorA[2]})`;
      ctx.fillRect(Math.floor(x),Math.floor(y),Math.ceil(colW)+1,Math.ceil(bH));
      ctx.fillStyle=`rgb(${colorB[0]},${colorB[1]},${colorB[2]})`;
      ctx.fillRect(Math.floor(x),Math.floor(y+bH),Math.ceil(colW)+1,Math.ceil(dH));
      y+=cellH;
    }
  }
}

// ─── Animation 3 ─────────────────────────────────────────────────
function drawPattern3(ts, W, H) {
  const NUM_COLS=23;
  const PULSE_MS=1200,PULSE_REST_MS=600,PULSE_CYCLE=PULSE_MS+PULSE_REST_MS;
  const cx=W/2,cy=H/2;
  const maxDist=Math.sqrt(cx*cx+cy*cy);

  ctx.fillStyle=`rgb(${colorB[0]},${colorB[1]},${colorB[2]})`;
  ctx.fillRect(0,0,W,H);

  const colW=W/NUM_COLS,cellH=H/26;
  const NUM_ROWS=Math.ceil(H/cellH)+4;

  for(let ci=0;ci<NUM_COLS;ci++){
    const x=ci*colW,colCx=x+colW/2;
    for(let ri=0;ri<NUM_ROWS;ri++){
      const rowCy=(ri-2)*cellH+cellH/2;
      const dx=colCx-cx,dy=rowCy-cy;
      // dist still drives the phase delay so wave ripples outward
      // but NO falloff — all rects animate at full amplitude
      const dist=Math.sqrt(dx*dx+dy*dy)/maxDist;
      const delay=dist*1.2*PULSE_MS;
      const e2=ts-delay;
      const lt=((e2%PULSE_CYCLE)+PULSE_CYCLE)%PULSE_CYCLE;
      let pf=lt<PULSE_MS?Math.sin((lt/PULSE_MS)*Math.PI):0;
      // subtle idle so nothing is ever fully still
      const idleFreq=0.0003+((ci*7+ri*13)%17)*0.00003;
      const idlePhase=((ci*31+ri*17)%100)/100;
      const idle=Math.sin(ts*idleFreq+idlePhase*Math.PI*2)*0.05;
      const bMin=0.08;
      const bMax=0.15+(depthVal/100)*0.82; // more dramatic range
      const bf=Math.max(0.04,Math.min(0.98,bMin+(pf*(bMax-bMin))+idle));
      const bH=bf*cellH;
      const rowY=(ri-2)*cellH;
      const y=rowY+cellH/2-bH/2;
      ctx.fillStyle=`rgb(${colorB[0]},${colorB[1]},${colorB[2]})`;
      ctx.fillRect(Math.floor(x),Math.floor(rowY),Math.ceil(colW)+1,Math.ceil(cellH));
      ctx.fillStyle=`rgb(${colorA[0]},${colorA[1]},${colorA[2]})`;
      ctx.fillRect(Math.floor(x),Math.floor(y),Math.ceil(colW)+1,Math.ceil(bH));
    }
  }
}

// ─── Animation 4 (exact Pattern 1, random Y start per column) ────
// Fixed random Y offsets per column, one per column, 0–H range
const P4_OFFSETS = Array.from({length: 23}, (_, i) => {
  return (((i * 2654435761) >>> 0) / 0xffffffff);
});

function drawPattern4(ts, W, H) {
  const NUM_COLS=23, LOOP_MS=30000, PHASE_SPREAD=0.55;
  const BRIGHT_MAX=0.82, BRIGHT_MIN=0.12, MAX_DRIFT=1.8;
  const SNAP_PX=50, SNAP_MOVE_MS=840, SNAP_REST_MS=2000;
  const SNAP_CYCLE_MS=SNAP_REST_MS+SNAP_MOVE_MS, SNAP_STAGGER_MS=100;

  function easeInOutSine(t){ return -(Math.cos(Math.PI*t)-1)/2; }
  function getSnapY(ci){
    const elapsed=ts-ci*SNAP_STAGGER_MS;
    const cycle=Math.floor(elapsed/SNAP_CYCLE_MS);
    const localT=((elapsed%SNAP_CYCLE_MS)+SNAP_CYCLE_MS)%SNAP_CYCLE_MS;
    let moveFrac=0;
    if(localT>=SNAP_REST_MS) moveFrac=easeInOutSine((localT-SNAP_REST_MS)/SNAP_MOVE_MS);
    return (cycle+moveFrac)*SNAP_PX;
  }

  const t=(ts%LOOP_MS)/LOOP_MS;
  const colW=W/NUM_COLS, cellH=H/26;

  for(let ci=0;ci<NUM_COLS;ci++){
    const colPhase = P4_OFFSETS[ci];
    const driftPx=Math.sin((t*3+colPhase)*Math.PI*2)*MAX_DRIFT*cellH;
    const snapPx=getSnapY(ci);
    const totalOffset=driftPx-snapPx;
    const offset=((totalOffset%cellH)+cellH*20)%cellH;
    let y=-cellH*3+offset;
    while(y<H+cellH){
      // Phase based on absolute Y position — stays smooth as column scrolls
      const ct=(t*3+colPhase+(y/(cellH*20)))%1.0;
      const sine=Math.sin(ct*Math.PI*2);
      const brightFrac=BRIGHT_MIN+((sine+1)/2)*(BRIGHT_MAX-BRIGHT_MIN);
      const brightH=brightFrac*cellH;
      const darkH=(1-brightFrac)*cellH;
      ctx.fillStyle=`rgb(${colorA[0]},${colorA[1]},${colorA[2]})`;
      ctx.fillRect(Math.floor(ci*colW),Math.floor(y),Math.ceil(colW)+1,Math.ceil(brightH));
      ctx.fillStyle=`rgb(${colorB[0]},${colorB[1]},${colorB[2]})`;
      ctx.fillRect(Math.floor(ci*colW),Math.floor(y+brightH),Math.ceil(colW)+1,Math.ceil(darkH));
      y+=cellH;
    }
  }
}

// ─── Animation 5 (chevron — mirrored Pattern 1, dramatic position) ─
function drawPattern5(ts, W, H) {
  const NUM_COLS=23, LOOP_MS=30000;
  const BRIGHT_MAX=0.92, BRIGHT_MIN=0.04, MAX_DRIFT=1.8;
  const SNAP_PX=50, SNAP_MOVE_MS=840, SNAP_REST_MS=2000;
  const SNAP_CYCLE_MS=SNAP_REST_MS+SNAP_MOVE_MS, SNAP_STAGGER_MS=100;

  function easeInOutSine(t){ return -(Math.cos(Math.PI*t)-1)/2; }
  function getSnapY(ci){
    const elapsed=ts-ci*SNAP_STAGGER_MS;
    const cycle=Math.floor(elapsed/SNAP_CYCLE_MS);
    const localT=((elapsed%SNAP_CYCLE_MS)+SNAP_CYCLE_MS)%SNAP_CYCLE_MS;
    let moveFrac=0;
    if(localT>=SNAP_REST_MS) moveFrac=easeInOutSine((localT-SNAP_REST_MS)/SNAP_MOVE_MS);
    return (cycle+moveFrac)*SNAP_PX;
  }

  ctx.fillStyle=`rgb(${colorB[0]},${colorB[1]},${colorB[2]})`;
  ctx.fillRect(0,0,W,H);

  const t=(ts%LOOP_MS)/LOOP_MS;
  const colW=W/NUM_COLS, cellH=H/26;
  const half=Math.floor(NUM_COLS/2);

  for(let ci=0;ci<NUM_COLS;ci++){
    const mirrorCi = ci <= half ? ci : NUM_COLS-1-ci;
    const phase=(mirrorCi/half)*0.55;
    const ct=(t+phase)%1.0;
    const sine=Math.sin(ct*Math.PI*2);

    const driftPx=sine*MAX_DRIFT*cellH;
    const snapPx=getSnapY(mirrorCi);
    const totalOffset=driftPx-snapPx;
    const offset=((totalOffset%cellH)+cellH*20)%cellH;

    // V shape: edges at top (0 offset), center column at bottom (H*0.5 offset)
    const vOffset = (mirrorCi/half) * (H * 0.5);

    let y=-cellH*3+offset+(vOffset%cellH);

    while(y<H+cellH){
      // Per-rect scale gradient — same as pattern 4
      const colPhase = mirrorCi/half;
      const rectCt=(t*3+colPhase+(y/(cellH*20)))%1.0;
      const rectSine=Math.sin(rectCt*Math.PI*2);
      const brightFrac=BRIGHT_MIN+((rectSine+1)/2)*(BRIGHT_MAX-BRIGHT_MIN);
      const brightH=brightFrac*cellH;
      const darkH=(1-brightFrac)*cellH;

      ctx.fillStyle=`rgb(${colorA[0]},${colorA[1]},${colorA[2]})`;
      ctx.fillRect(Math.floor(ci*colW),Math.floor(y),Math.ceil(colW)+1,Math.ceil(brightH));
      ctx.fillStyle=`rgb(${colorB[0]},${colorB[1]},${colorB[2]})`;
      ctx.fillRect(Math.floor(ci*colW),Math.floor(y+brightH),Math.ceil(colW)+1,Math.ceil(darkH));
      y+=cellH;
    }
  }
}

// ─── Main Loop ───────────────────────────────────────────────────
function draw(ts) {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(currentPattern===1) drawPattern1(ts,W,H);
  else if(currentPattern===2) drawPattern2(ts,W,H);
  else if(currentPattern===3) drawPattern3(ts,W,H);
  else if(currentPattern===4) drawPattern4(ts,W,H);
  else drawPattern5(ts,W,H);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ─── Export HTML ─────────────────────────────────────────────────
document.getElementById('btn-html').addEventListener('click', () => {
  const html = buildHTML(currentPattern, colorA, colorB);
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pattern_${currentPattern}_${rgbToHex(...colorA).replace('#','')}.html`;
  a.click();
});

function buildHTML(patternNum, cA, cB) {
  const ra=cA[0],ga=cA[1],ba=cA[2];
  const rb=cB[0],gb=cB[1],bb=cB[2];
  const bg = patternNum===1 ? '#000' : `rgb(${rb},${gb},${bb})`;

  const SHARED = `
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const A=[${ra},${ga},${ba}],B=[${rb},${gb},${bb}];
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const SNAP_PX=50,SNAP_MOVE_MS=840,SNAP_REST_MS=2000,SNAP_CYCLE_MS=2840,SNAP_STAGGER_MS=100;
function eio(t){return -(Math.cos(Math.PI*t)-1)/2;}
function getSnapY(ci,ts){const e=ts-ci*SNAP_STAGGER_MS,cy=Math.floor(e/SNAP_CYCLE_MS),lt=((e%SNAP_CYCLE_MS)+SNAP_CYCLE_MS)%SNAP_CYCLE_MS;let mf=0;if(lt>=SNAP_REST_MS)mf=eio((lt-SNAP_REST_MS)/SNAP_MOVE_MS);return(cy+mf)*SNAP_PX;}`;

  let drawFn = '';

  if (patternNum === 1) {
    drawFn = `
function draw(ts){
  const W=canvas.width,H=canvas.height,t=(ts%30000)/30000;
  ctx.clearRect(0,0,W,H);
  const colW=W/23,cellH=H/26;
  for(let ci=0;ci<23;ci++){
    const phase=(ci/22)*0.55,ct=(t+phase)%1,sine=Math.sin(ct*Math.PI*2);
    const bf=0.12+((sine+1)/2)*0.70,bH=bf*cellH,dH=(1-bf)*cellH;
    const drift=sine*1.8*cellH,snap=getSnapY(ci,ts);
    const off=((drift-snap)%cellH+cellH*20)%cellH;
    let y=-cellH*3+off;
    while(y<H+cellH){
      ctx.fillStyle='rgb('+A+')';ctx.fillRect(Math.floor(ci*colW),Math.floor(y),Math.ceil(colW)+1,Math.ceil(bH));
      ctx.fillStyle='rgb('+B+')';ctx.fillRect(Math.floor(ci*colW),Math.floor(y+bH),Math.ceil(colW)+1,Math.ceil(dH));
      y+=cellH;
    }
  }
  requestAnimationFrame(draw);
}`;
  } else if (patternNum === 2) {
    drawFn = `
function draw(ts){
  const W=canvas.width,H=canvas.height,t=(ts%30000)/30000;
  ctx.fillStyle='rgb('+B+')';ctx.fillRect(0,0,W,H);
  const colW=W/23,cellH=H/26;
  for(let ci=0;ci<23;ci++){
    const d=Math.abs(ci-11)/11,phase=d*0.55,ct=(t+phase)%1,sine=Math.sin(ct*Math.PI*2);
    const bf=0.12+((sine+1)/2)*0.70,bH=bf*cellH,dH=(1-bf)*cellH;
    const dir=ci<11?-1:1,drift=sine*1.8*cellH*dir;
    const sd=Math.round(Math.abs(ci-11)),snap=getSnapY(sd,ts)*dir;
    const off=((drift-snap)%cellH+cellH*20)%cellH;
    let y=-cellH*3+off;
    while(y<H+cellH){
      ctx.fillStyle='rgb('+A+')';ctx.fillRect(Math.floor(ci*colW),Math.floor(y),Math.ceil(colW)+1,Math.ceil(bH));
      ctx.fillStyle='rgb('+B+')';ctx.fillRect(Math.floor(ci*colW),Math.floor(y+bH),Math.ceil(colW)+1,Math.ceil(dH));
      y+=cellH;
    }
  }
  requestAnimationFrame(draw);
}`;
  } else if (patternNum === 3) {
    drawFn = `
function draw(ts){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,maxDist=Math.sqrt(cx*cx+cy*cy);
  ctx.fillStyle='rgb('+B+')';ctx.fillRect(0,0,W,H);
  const colW=W/23,cellH=H/26,NR=Math.ceil(H/cellH)+4;
  for(let ci=0;ci<23;ci++){
    const x=ci*colW,ccx=x+colW/2;
    for(let ri=0;ri<NR;ri++){
      const rcy=(ri-2)*cellH+cellH/2,dx=ccx-cx,dy=rcy-cy,dist=Math.sqrt(dx*dx+dy*dy)/maxDist;
      const delay=dist*1.2*1200,e2=ts-delay,lt=((e2%1800)+1800)%1800;
      let pf=lt<1200?Math.sin((lt/1200)*Math.PI):0;
      const iF=0.0003+((ci*7+ri*13)%17)*0.00003,iP=((ci*31+ri*17)%100)/100;
      const idle=Math.sin(ts*iF+iP*Math.PI*2)*0.05;
      const bf=Math.max(0.04,Math.min(0.98,0.08+(pf*0.74)+idle));
      const bH=bf*cellH,rowY=(ri-2)*cellH,y=rowY+cellH/2-bH/2;
      ctx.fillStyle='rgb('+B+')';ctx.fillRect(Math.floor(x),Math.floor(rowY),Math.ceil(colW)+1,Math.ceil(cellH));
      ctx.fillStyle='rgb('+A+')';ctx.fillRect(Math.floor(x),Math.floor(y),Math.ceil(colW)+1,Math.ceil(bH));
    }
  }
  requestAnimationFrame(draw);
}`;
  } else if (patternNum === 4) {
    drawFn = `
const P4=[...Array(23)].map((_,i)=>(((i*2654435761)>>>0)/0xffffffff));
function draw(ts){
  const W=canvas.width,H=canvas.height,t=(ts%30000)/30000;
  ctx.clearRect(0,0,W,H);
  const colW=W/23,cellH=H/26;
  for(let ci=0;ci<23;ci++){
    const phase=P4[ci],ct=(t+phase)%1,sine=Math.sin(ct*Math.PI*2);
    const drift=sine*1.8*cellH,snap=getSnapY(ci,ts);
    const off=((drift-snap)%cellH+cellH*20)%cellH;
    const colPhase=P4[ci];
    let y=-cellH*3+off;
    while(y<H+cellH){
      const rct=(t*3+colPhase+(y/(cellH*20)))%1,rs=Math.sin(rct*Math.PI*2);
      const bf=0.12+((rs+1)/2)*0.70,bH=bf*cellH,dH=(1-bf)*cellH;
      ctx.fillStyle='rgb('+A+')';ctx.fillRect(Math.floor(ci*colW),Math.floor(y),Math.ceil(colW)+1,Math.ceil(bH));
      ctx.fillStyle='rgb('+B+')';ctx.fillRect(Math.floor(ci*colW),Math.floor(y+bH),Math.ceil(colW)+1,Math.ceil(dH));
      y+=cellH;
    }
  }
  requestAnimationFrame(draw);
}`;
  } else if (patternNum === 5) {
    drawFn = `
function draw(ts){
  const W=canvas.width,H=canvas.height,t=(ts%30000)/30000;
  ctx.fillStyle='rgb('+B+')';ctx.fillRect(0,0,W,H);
  const colW=W/23,cellH=H/26,half=11;
  for(let ci=0;ci<23;ci++){
    const mci=ci<=half?ci:22-ci,phase=(mci/half)*0.55,ct=(t+phase)%1,sine=Math.sin(ct*Math.PI*2);
    const drift=sine*1.8*cellH,snap=getSnapY(mci,ts);
    const off=((drift-snap)%cellH+cellH*20)%cellH;
    const vOff=(mci/half)*(H*0.5),colPhase=mci/half;
    let y=-cellH*3+off+(vOff%cellH);
    while(y<H+cellH){
      const rct=(t*3+colPhase+(y/(cellH*20)))%1,rs=Math.sin(rct*Math.PI*2);
      const bf=0.04+((rs+1)/2)*0.88,bH=bf*cellH,dH=(1-bf)*cellH;
      ctx.fillStyle='rgb('+A+')';ctx.fillRect(Math.floor(ci*colW),Math.floor(y),Math.ceil(colW)+1,Math.ceil(bH));
      ctx.fillStyle='rgb('+B+')';ctx.fillRect(Math.floor(ci*colW),Math.floor(y+bH),Math.ceil(colW)+1,Math.ceil(dH));
      y+=cellH;
    }
  }
  requestAnimationFrame(draw);
}`;
  }

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:${bg};overflow:hidden}canvas{display:block;width:100%;height:100%}</style></head><body><canvas id="c"></canvas><script>${SHARED}${drawFn}\nrequestAnimationFrame(draw);\<\/script></body></html>`;
}

// ─── Randomize ───────────────────────────────────────────────────
document.getElementById('btn-randomize').addEventListener('click', () => {
  // Pick random pattern 1-5
  const randPattern = Math.floor(Math.random() * 5) + 1;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelector(`.tab[data-pattern="${randPattern}"]`).classList.add('active');
  currentPattern = randPattern;

  // Pick random preset
  const randPreset = Math.floor(Math.random() * PRESETS.length);
  document.querySelectorAll('.preset').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.preset')[randPreset].classList.add('active');
  const p = PRESETS[randPreset];
  colorA = hexToRgb(p.a);
  colorB = hexToRgb(p.b);
});
// ─── Export All (batch 25 HTMLs + 25 MP4s) ───────────────────────
document.getElementById('btn-all').addEventListener('click', () => {
  showModal(
    'Export All',
    'Exports all 25 combinations (5 patterns × 5 colors) as HTML files and MP4 videos. Videos record 60s each — total ~30 minutes. Click Start to begin.',
    'Start',
    startBatchExport
  );
});

async function startBatchExport() {
  const indicator = document.getElementById('recording-indicator');
  const presetNames = ['lime','sky','teal','orange','olive'];
  const total = PRESETS.length * 5;
  let done = 0;

  for (let pi = 1; pi <= 5; pi++) {
    for (let ci = 0; ci < PRESETS.length; ci++) {
      const p = PRESETS[ci];
      const name = `onramp_p${pi}_${presetNames[ci]}`;

      currentPattern = pi;
      colorA = hexToRgb(p.a);
      colorB = hexToRgb(p.b);

      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelector(`.tab[data-pattern="${pi}"]`).classList.add('active');
      document.querySelectorAll('.preset').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.preset')[ci].classList.add('active');

      // Export HTML
      const htmlBlob = new Blob([buildHTML(pi, colorA, colorB)], {type:'text/html'});
      const ha = document.createElement('a');
      ha.href = URL.createObjectURL(htmlBlob);
      ha.download = `${name}.html`;
      ha.click();
      await sleep(400);

      // Record + convert MP4
      done++;
      indicator.classList.add('show');
      await recordAndConvert(name, done, total);
      await sleep(500);
    }
  }

  indicator.classList.remove('show');
  indicator.innerHTML = '<div class="rec-dot"></div> Recording...';
  showModal('All Done!', `${total} HTMLs and ${total} MP4s exported.`, 'Done', ()=>{});
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function recordAndConvert(name, done, total) {
  const indicator = document.getElementById('recording-indicator');

  // Force 1920x1080 for recording
  const prevW = canvas.width, prevH = canvas.height;
  canvas.width = 1920; canvas.height = 1080;

  return new Promise((resolve) => {
    const chunks = [];
    const mimeType = 'video/webm;codecs=vp9';
    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 16000000 });
    recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    recorder.onstop = () => {
      canvas.width = prevW; canvas.height = prevH;
      const blob = new Blob(chunks, { type: mimeType });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${name}.webm`;
      a.click();
      resolve();
    };
    recorder.start();
    let remaining = 60;
    const tick = setInterval(() => {
      remaining--;
      indicator.innerHTML = `<div class="rec-dot"></div> ${done}/${total} — ${name} ${remaining}s`;
      if(remaining <= 0) { clearInterval(tick); recorder.stop(); }
    }, 1000);
  });
}

async function convertNamedMp4(webmBlob, name) {
  if (!window._ffmpegLoaded) {
    if (!window.FFmpeg) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const { FFmpeg } = window.FFmpeg;
    const ff = new FFmpeg();
    await ff.load({ coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js' });
    window._ffmpegLoaded = ff;
  }
  const ff = window._ffmpegLoaded;
  const data = new Uint8Array(await webmBlob.arrayBuffer());
  await ff.writeFile('i.webm', data);
  await ff.exec(['-i','i.webm','-c:v','libx264','-preset','fast','-crf','18','-pix_fmt','yuv420p','o.mp4']);
  const out = await ff.readFile('o.mp4');
  const blob = new Blob([out.buffer], { type:'video/mp4' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${name}.mp4`;
  a.click();
  await ff.deleteFile('i.webm');
  await ff.deleteFile('o.mp4');
}

document.getElementById('btn-mp4').addEventListener('click', () => {
  showModal(
    'Export MP4',
    'Records 60 seconds at 30fps and converts to a real MP4. First export loads FFmpeg (~30MB) so may take a moment. Click Record to start.',
    'Record',
    startVideoExport
  );
});

function startVideoExport() {
  const indicator = document.getElementById('recording-indicator');
  indicator.classList.add('show');
  indicator.innerHTML = '<div class="rec-dot"></div> Recording...';

  // Use screen size, don't force 1920x1080 — too heavy for browser recorder
  const chunks = [];
  const mimeType = 'video/webm;codecs=vp9';
  const stream = canvas.captureStream(24);
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8000000 });

  recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    indicator.classList.remove('show');
    indicator.innerHTML = '<div class="rec-dot"></div> Recording...';
    const blob = new Blob(chunks, { type: mimeType });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `onramp_pattern_${currentPattern}.webm`;
    a.click();
  };

  recorder.start(1000); // collect data every second
  let remaining = 30;
  const tick = setInterval(() => {
    remaining--;
    indicator.innerHTML = `<div class="rec-dot"></div> Recording ${remaining}s...`;
    if(remaining <= 0) { clearInterval(tick); recorder.stop(); }
  }, 1000);
}

async function convertToMp4(webmBlob) {
  const indicator = document.getElementById('recording-indicator');
  try {
    // Load ffmpeg.wasm
    if (!window.FFmpeg) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    const { FFmpeg } = window.FFmpeg || FFmpegWASM;
    const ffmpeg = new FFmpeg();

    ffmpeg.on('progress', ({ progress }) => {
      indicator.innerHTML = `<div class="rec-dot"></div> Converting ${Math.round(progress*100)}%...`;
    });

    await ffmpeg.load({
      coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
    });

    const webmData = new Uint8Array(await webmBlob.arrayBuffer());
    await ffmpeg.writeFile('input.webm', webmData);
    await ffmpeg.exec(['-i', 'input.webm', '-c:v', 'libx264', '-preset', 'fast', '-crf', '18', '-pix_fmt', 'yuv420p', 'output.mp4']);
    const mp4Data = await ffmpeg.readFile('output.mp4');
    const mp4Blob = new Blob([mp4Data.buffer], { type: 'video/mp4' });

    const a = document.createElement('a');
    a.href = URL.createObjectURL(mp4Blob);
    a.download = `onramp_pattern_${currentPattern}.mp4`;
    a.click();

    indicator.classList.remove('show');
    indicator.innerHTML = '<div class="rec-dot"></div> Recording...';
  } catch(e) {
    console.error(e);
    indicator.innerHTML = '<div class="rec-dot"></div> Error — see console';
    setTimeout(() => { indicator.classList.remove('show'); indicator.innerHTML = '<div class="rec-dot"></div> Recording...'; }, 3000);
  }
}
